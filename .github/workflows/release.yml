name: Release exe

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Build exe
        run: pyinstaller game_assistant.spec
      - name: Sanity check artifact
        run: |
          if (-not (Test-Path "dist/game_assistant.exe")) { throw "build did not produce dist/game_assistant.exe" }
          Get-Item "dist/game_assistant.exe" | Select-Object Name, Length
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/game_assistant.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
