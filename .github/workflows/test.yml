name: Tests

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest -v
